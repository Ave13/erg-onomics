<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Erg</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#111118; --card:#1e1f2a; --label:#737aaa; --value:#f2f2f8;
  --green:#26da72; --red:#ff5940; --hr-red:#f25757; --blue:#2e8cd9;
  --orange:#f27320; --yellow:#e6c21a; --btn-h:64px;
}
html,body { height:100%; background:var(--bg); color:var(--value);
            font-family:-apple-system,sans-serif; overflow:hidden; }

/* ── Top nav ── */
#nav { display:flex; background:var(--card); border-bottom:1px solid #2a2b3a; flex-shrink:0; }
#nav button { flex:1; height:50px; background:none; border:none; color:var(--label);
              font-size:14px; font-weight:600; cursor:pointer; }
#nav button.active { color:var(--value); border-bottom:2px solid var(--blue); }

/* ── Page shell ── */
#shell { display:flex; flex-direction:column; height:100vh; }
.page { display:none; flex:1; overflow-y:auto; padding:10px; }
.page.active { display:flex; flex-direction:column; }

/* ── Row page layout ── */
#row-header { display:flex; align-items:center; justify-content:space-between;
              margin-bottom:6px; min-height:22px; }
#status { font-size:13px; color:var(--label); }
#status .recording { color:var(--green); font-weight:700; }
#status .paused    { color:var(--blue);  font-weight:700; }
#screen-dots { display:flex; gap:6px; }
#screen-dots span { width:7px; height:7px; border-radius:50%;
                    background:#2a2b3a; transition:background .2s; }
#screen-dots span.active { background:var(--blue); }
#screen-label { font-size:12px; color:var(--label); text-align:center; margin-bottom:6px; }

/* ── Swipeable screen area ── */
#screen-wrap { flex:1; touch-action:pan-y; min-height:0; display:flex; flex-direction:column; }

/* ── Hero metric (large centre value) ── */
.hero-card { background:var(--card); border-radius:14px; padding:14px 10px 10px;
             text-align:center; margin-bottom:8px; cursor:pointer; }
.hero-card .lbl { font-size:12px; color:var(--label); text-transform:uppercase;
                  letter-spacing:.08em; }
.hero-card .val { font-size:clamp(52px,14vw,90px); font-weight:700; line-height:1.05; }
.hero-card.pace-green .val { color:var(--green); }
.hero-card.pace-red   .val { color:var(--red); }
.hero-card.hr-card    .val { color:var(--hr-red); }

/* ── Secondary metric grid ── */
.metric-row { display:grid; gap:7px; margin-bottom:7px; }
.metric-row.cols2 { grid-template-columns:1fr 1fr; }
.metric-row.cols3 { grid-template-columns:1fr 1fr 1fr; }
.card { background:var(--card); border-radius:12px; padding:10px 6px 8px;
        text-align:center; cursor:pointer; }
.card .lbl { font-size:11px; color:var(--label); text-transform:uppercase;
             letter-spacing:.07em; }
.card .val { font-size:clamp(22px,6vw,34px); font-weight:700; line-height:1.15; }
.card .sub { font-size:11px; color:var(--label); margin-top:2px; }

/* ── Zone strip (endurance screen) ── */
#zone-strip { display:flex; height:14px; border-radius:4px; overflow:hidden; margin:6px 0; }
#zone-strip span { flex:0 0 0%; height:100%; transition:flex .4s; }

/* ── Technique screen ── */
.tech-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:7px; margin-bottom:7px; }
.tech-card { background:var(--card); border-radius:10px; padding:10px 6px 8px; text-align:center; }
.tech-card .lbl { font-size:10px; color:var(--label); text-transform:uppercase; }
.tech-card .val { font-size:clamp(18px,5vw,28px); font-weight:700; }
.tech-card .val.good  { color:var(--green); }
.tech-card .val.warn  { color:var(--yellow); }
.tech-card .val.bad   { color:var(--red); }

/* ── Force curve screen ── */
#force-wrap { background:var(--card); border-radius:14px; padding:12px; margin-bottom:8px; }
#force-canvas { width:100%; height:160px; display:block; }
#streak-wrap { background:var(--card); border-radius:12px; padding:14px;
               text-align:center; margin-bottom:8px; }
#streak-num  { font-size:clamp(42px,12vw,72px); font-weight:700; color:var(--green); }
#streak-lbl  { font-size:13px; color:var(--label); margin-top:2px; }
#streak-best { font-size:12px; color:var(--label); margin-top:4px; }

/* ── Intervals screen ── */
#iv-counter { background:var(--card); border-radius:14px; padding:16px 10px;
              text-align:center; margin-bottom:8px; }
#iv-num  { font-size:clamp(48px,13vw,80px); font-weight:700; line-height:1; }
#iv-of   { font-size:16px; color:var(--label); margin-top:4px; }
#iv-phase { font-size:18px; font-weight:700; margin-top:6px; }
#iv-phase.work { color:var(--green); }
#iv-phase.rest { color:var(--orange); }
#iv-phase.done { color:var(--label); }
#iv-progress-wrap { background:var(--card); border-radius:12px;
                    padding:12px; margin-bottom:8px; overflow:hidden; }
#iv-progress-bar { height:12px; border-radius:6px; background:var(--green);
                   transition:width .5s; width:0%; }
#iv-progress-bg  { height:12px; border-radius:6px; background:#2a2b3a; }
#iv-remaining { font-size:clamp(32px,9vw,56px); font-weight:700;
                text-align:center; margin-top:8px; }

/* ── Target pace bar ── */
#target-bar { display:none; background:#2a2a1e; border-left:4px solid var(--yellow);
              border-radius:4px; padding:6px 12px; font-size:13px; color:var(--yellow);
              margin-bottom:8px; display:flex; align-items:center; justify-content:space-between; }
#target-bar.hidden { display:none !important; }

/* ── Session buttons ── */
#controls { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:8px; }
#controls2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:4px; }
button.btn { height:var(--btn-h); border:none; border-radius:10px;
             font-size:18px; font-weight:700; cursor:pointer; width:100%; }
button.btn:active { opacity:.75; }
button.btn:disabled { opacity:.35; cursor:default; }
.btn-start   { background:#26b870; color:#fff; }
.btn-pause   { background:var(--blue); color:#fff; }
.btn-end     { background:#d94040; color:#fff; }
.btn-neutral { background:#383c4d; color:#ccc; }

/* ── Modal ── */
#modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.75);
                 z-index:100; align-items:center; justify-content:center; }
#modal-overlay.open { display:flex; }
#modal { background:var(--card); border-radius:16px; padding:22px;
         width:min(90vw,380px); max-height:80vh; overflow-y:auto; }
#modal h2 { font-size:19px; margin-bottom:14px; }
.form-row { margin-bottom:12px; }
.form-row label { display:block; font-size:12px; color:var(--label); margin-bottom:4px; }
.form-row input, .form-row select {
  width:100%; height:46px; background:#111118; color:var(--value);
  border:1px solid #2a2b3a; border-radius:8px; padding:0 12px; font-size:16px; }
.form-row .row2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.modal-btns { display:flex; gap:8px; margin-top:16px; }
.modal-btns button { flex:1; }
#modal-err { color:var(--red); font-size:13px; margin-top:8px; min-height:18px; }

/* ── Resume prompt ── */
#resume-prompt { display:none; background:#1e2a1e; border:1px solid var(--green);
                 border-radius:10px; padding:12px; margin-bottom:10px; }
#resume-prompt p { font-size:14px; margin-bottom:10px; }
#resume-prompt .row { display:flex; gap:8px; }

/* ── History / summary ── */
h3 { font-size:14px; color:var(--label); text-transform:uppercase;
     letter-spacing:.06em; margin:14px 0 8px; }
.hist-row { display:flex; align-items:center; justify-content:space-between;
            background:var(--card); border-radius:10px; padding:11px 13px;
            margin-bottom:7px; cursor:pointer; font-size:13px; }
.hist-row:active { opacity:.7; }
#summary-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:7px; margin-bottom:10px; }
.scard { background:var(--card); border-radius:10px; padding:10px 6px; text-align:center; }
.scard .lbl { font-size:10px; color:var(--label); text-transform:uppercase; }
.scard .val { font-size:20px; font-weight:700; }
#pace-chart-wrap, #force-chart-wrap { background:var(--card); border-radius:10px;
                                       padding:10px; margin-bottom:8px; }
canvas.chart { width:100% !important; }

/* ── Splits table ── */
#splits-table { width:100%; border-collapse:collapse; font-size:13px; margin-bottom:12px; }
#splits-table th { color:var(--label); font-weight:600; text-align:left;
                   padding:5px 8px; border-bottom:1px solid #2a2b3a; }
#splits-table td { padding:6px 8px; border-bottom:1px solid #1a1b26; }
#splits-table tr:nth-child(even) td { background:#191924; }
.pace-fast { color:var(--green); }
.pace-slow { color:var(--red); }

/* ── Zone / strive ── */
#sum-zone-bar { display:flex; height:14px; border-radius:4px; overflow:hidden; margin:6px 0 12px; }
.pr { background:#2d2a10; border:1px solid var(--yellow); border-radius:6px;
      padding:6px 11px; color:var(--yellow); font-size:13px; margin:3px 0; }

/* ── BLE status pill ── */
#ble-pill { display:flex; align-items:center; gap:5px; cursor:pointer;
            background:var(--card); border-radius:20px; padding:3px 10px;
            font-size:12px; font-weight:600; border:none; color:var(--value); }
#ble-dot  { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
#ble-dot.scanning    { background:var(--label); animation:blink 1.5s infinite; }
#ble-dot.found       { background:var(--blue);  animation:blink 1s   infinite; }
#ble-dot.connecting  { background:var(--yellow); animation:blink .8s  infinite; }
#ble-dot.connected   { background:var(--green); }
#ble-dot.disconnected{ background:var(--red); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }

/* ── Erg picker bottom sheet ── */
#erg-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.75);
               z-index:101; align-items:flex-end; justify-content:center; }
#erg-overlay.open { display:flex; }
#erg-sheet { background:var(--card); border-radius:16px 16px 0 0; padding:18px 16px;
             width:100%; max-width:480px; }
#erg-sheet h2 { font-size:17px; margin-bottom:14px; }
.erg-row { display:flex; align-items:center; justify-content:space-between;
           background:#111118; border-radius:10px; padding:12px 14px;
           margin-bottom:8px; cursor:pointer; }
.erg-row:active { opacity:.7; }
.erg-row-name { font-size:15px; font-weight:600; }
.erg-row-addr { font-size:12px; color:var(--label); margin-top:2px; }
.erg-check { color:var(--green); font-size:18px; flex-shrink:0; }

/* ── Workouts / Plan / Profile ── */
.wk-row { display:flex; align-items:center; justify-content:space-between;
          background:var(--card); border-radius:10px; padding:11px 13px; margin-bottom:7px; }
.wk-row .name { font-size:14px; font-weight:600; }
.wk-row .sub  { font-size:11px; color:var(--label); margin-top:2px; }
.plan-row { display:flex; align-items:center; gap:8px; background:var(--card);
            border-radius:10px; padding:9px 12px; margin-bottom:7px; }
.plan-day { width:34px; font-weight:700; flex-shrink:0; font-size:14px; }
.plan-wk  { flex:1; font-size:13px; color:var(--label); }
.plan-wk.set { color:var(--value); }
button.sm { height:36px; padding:0 13px; border-radius:8px; border:none;
            font-size:13px; font-weight:600; cursor:pointer; background:#383c4d; color:#ccc; }
button.sm.sel { background:var(--blue); color:#fff; }
button.sm:active { opacity:.75; }
#wk-err { color:var(--red); font-size:13px; margin:6px 0; min-height:18px; }
#p-msg  { text-align:center; font-size:13px; min-height:18px; }
</style>
</head>
<body>
<div id="shell">
<div id="nav">
  <button class="active" onclick="nav('row')">Row</button>
  <button onclick="nav('history')">History</button>
  <button onclick="nav('workouts')">Workouts</button>
  <button onclick="nav('plan')">Plan</button>
  <button onclick="nav('profile')">Profile</button>
</div>

<!-- ══ ROW PAGE ══════════════════════════════════════════════════════════════ -->
<div id="page-row" class="page active">
  <div id="resume-prompt">
    <p id="resume-msg"></p>
    <div class="row">
      <button class="btn btn-start" style="height:46px;font-size:15px" onclick="doResume()">Resume</button>
      <button class="btn btn-neutral" style="height:46px;font-size:15px" onclick="dismissResume()">Start New</button>
    </div>
  </div>

  <div id="row-header">
    <div id="status">Ready</div>
    <button id="ble-pill" onclick="openErgPicker()">
      <span id="ble-dot" class="scanning"></span>
      <span id="ble-text">Scanning…</span>
    </button>
    <div id="screen-dots"></div>
  </div>
  <div id="screen-label"></div>

  <div id="screen-wrap"><!-- rendered by renderScreen() --></div>

  <div id="target-bar" class="hidden">
    <span id="target-label"></span>
    <button class="sm" onclick="clearTarget()">Clear</button>
  </div>

  <div id="controls">
    <button class="btn btn-start" id="btn-start" onclick="doStart()">Start</button>
    <button class="btn btn-pause" id="btn-pause" onclick="doPause()" disabled>Pause</button>
    <button class="btn btn-end"   id="btn-end"   onclick="doEnd()"   disabled>End</button>
  </div>
  <div id="controls2">
    <button class="btn btn-neutral" onclick="openTargetModal()">Target Pace</button>
    <button class="btn btn-neutral" onclick="nav('workouts')">Workout</button>
  </div>
</div>

<!-- ══ HISTORY PAGE ══════════════════════════════════════════════════════════ -->
<div id="page-history" class="page">
  <div id="summary-panel" style="display:none">
    <h3 id="summary-title"></h3>
    <div id="summary-stats"></div>
    <div id="pace-chart-wrap" style="display:none"><canvas id="pace-chart" class="chart" height="110"></canvas></div>
    <div id="force-chart-wrap" style="display:none"><canvas id="force-chart" class="chart" height="80"></canvas></div>
    <div id="strive-score" style="font-size:17px;font-weight:700;margin-bottom:4px"></div>
    <div id="sum-zone-bar"></div>
    <div id="splits-wrap"><h3>Splits</h3><table id="splits-table"><thead><tr><th>#</th><th>Dist</th><th>Pace</th><th>Time</th><th>HR</th></tr></thead><tbody id="splits-body"></tbody></table></div>
    <div id="pr-list"></div>
    <div id="streak-info" style="font-size:13px;color:var(--label);margin-bottom:10px"></div>
    <div id="summary-meta" style="font-size:12px;color:var(--label);margin-bottom:14px"></div>
    <button class="btn btn-neutral" style="height:46px;font-size:15px;margin-bottom:14px" onclick="hideSummary()">Done</button>
    <hr style="border-color:#2a2b3a;margin-bottom:14px">
  </div>
  <h3>Sessions</h3>
  <div id="hist-list"></div>
</div>

<!-- ══ WORKOUTS PAGE ════════════════════════════════════════════════════════ -->
<div id="page-workouts" class="page">
  <h3>Library</h3>
  <div id="wk-list"></div>
  <h3>New Custom Workout</h3>
  <div class="form-row"><label>Name</label><input id="wk-name" type="text" value="My Workout"></div>
  <div class="form-row"><label>Type</label>
    <select id="wk-type" onchange="renderIntervalForm()">
      <option value="distance">Distance</option>
      <option value="time">Time</option>
      <option value="calorie">Calorie</option>
    </select>
  </div>
  <div id="interval-form"></div>
  <div class="form-row"><label>Rest</label>
    <select id="wk-rest">
      <option value="0">No rest</option>
      <option value="30">0:30</option>
      <option value="60">1:00</option>
      <option value="90">1:30</option>
      <option value="120" selected>2:00</option>
      <option value="180">3:00</option>
      <option value="240">4:00</option>
      <option value="300">5:00</option>
      <option value="600">10:00</option>
      <option value="-1">Athlete decides</option>
    </select>
  </div>
  <div class="form-row"><label>Reps</label>
    <input id="wk-reps" type="number" value="1" min="1" max="50">
  </div>
  <div id="wk-err"></div>
  <button class="btn btn-neutral" style="height:52px;font-size:16px" onclick="saveWorkout()">Save Workout</button>
</div>

<!-- ══ PLAN PAGE ════════════════════════════════════════════════════════════ -->
<div id="page-plan" class="page">
  <h3>Weekly Plan</h3>
  <div id="plan-grid"></div>
</div>

<!-- ══ PROFILE PAGE ═════════════════════════════════════════════════════════ -->
<div id="page-profile" class="page">
  <h3>Profile</h3>
  <div class="form-row"><label>Name</label><input id="p-name" type="text" placeholder="Your name"></div>
  <div class="form-row"><label>Weight (kg)</label><input id="p-weight" type="number" step="0.5" min="30" max="200"></div>
  <div class="form-row"><label>Height</label>
    <div class="row2"><input id="p-ft" type="number" min="4" max="7" placeholder="ft">
    <input id="p-in" type="number" min="0" max="11" placeholder="in"></div>
  </div>
  <div class="form-row"><label>Date of Birth (optional)</label><input id="p-dob" type="date"></div>
  <button class="btn btn-start" style="height:54px;font-size:17px;margin-bottom:16px" onclick="saveProfile()">Save Profile</button>
  <div id="p-msg"></div>
</div>

<!-- ══ TARGET PACE MODAL ════════════════════════════════════════════════════ -->
<div id="modal-overlay" onclick="closeModal(event)">
  <div id="modal">
    <h2>Target Pace /500m</h2>
    <div class="form-row"><label>Minutes</label><input id="tgt-min" type="number" min="1" max="9" value="2"></div>
    <div class="form-row"><label>Seconds</label><input id="tgt-sec" type="number" min="0" max="59" value="0"></div>
    <div id="modal-err"></div>
    <div class="modal-btns">
      <button class="btn btn-neutral" onclick="closeModal()">Cancel</button>
      <button class="btn btn-start"   onclick="setTarget()">Set</button>
    </div>
  </div>
</div>
<!-- ══ ERG PICKER SHEET ══════════════════════════════════════════════════════ -->
<div id="erg-overlay" onclick="closeErgPicker(event)">
  <div id="erg-sheet">
    <h2>Select Erg</h2>
    <div id="erg-list"></div>
    <button class="btn btn-neutral" style="height:46px;margin-top:4px" onclick="closeErgPicker()">Cancel</button>
  </div>
</div>

</div><!-- #shell -->

<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script>
// ── Constants ────────────────────────────────────────────────────────────────
const SCREENS = ['Power','Endurance','Technique','Force Curve','Intervals'];
const ZONE_COLORS = ['#4d8cd8','#33bf72','#f2bf19','#f27219','#e53333'];
const TANAKA_MAX_HR = (dob) => {
  if (!dob) return 185;
  const age = (Date.now() - new Date(dob)) / 31557600000;
  return Math.round(208 - 0.7 * age);
};

// ── State ────────────────────────────────────────────────────────────────────
let _s = {};             // latest server state
let _active = false, _paused = false;
let _resumeId = null;
let _targetSec = null;
let _screen = parseInt(localStorage.getItem('screen') || '0');
let _paceChart = null, _forceChart = null;
let _touchStartX = 0;
// Tap-to-flip: which alternate is showing for each slot
const _flip = {};
// BLE
let _bleDevices = [];
let _bleAddress = localStorage.getItem('bleAddress') || null;

// ── Navigation ────────────────────────────────────────────────────────────────
function nav(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('#nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  const idx = ['row','history','workouts','plan','profile'].indexOf(page);
  document.querySelectorAll('#nav button')[idx].classList.add('active');
  if (page === 'history')  loadHistory();
  if (page === 'workouts') { loadWorkouts(); renderIntervalForm(); }
  if (page === 'plan')     loadPlan();
  if (page === 'profile')  loadProfile();
}

// ── Screen dots ───────────────────────────────────────────────────────────────
function renderDots() {
  const el = document.getElementById('screen-dots');
  el.innerHTML = SCREENS.map((_, i) =>
    `<span class="${i === _screen ? 'active' : ''}"></span>`
  ).join('');
  document.getElementById('screen-label').textContent = SCREENS[_screen];
}

// ── Swipe handling ────────────────────────────────────────────────────────────
document.getElementById('screen-wrap').addEventListener('touchstart', e => {
  _touchStartX = e.touches[0].clientX;
}, {passive:true});
document.getElementById('screen-wrap').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - _touchStartX;
  if (Math.abs(dx) < 40) return;
  if (dx < 0 && _screen < SCREENS.length - 1) _screen++;
  else if (dx > 0 && _screen > 0)             _screen--;
  localStorage.setItem('screen', _screen);
  renderDots();
  renderScreen();
}, {passive:true});

// ── Render current screen ─────────────────────────────────────────────────────
function renderScreen() {
  const w = document.getElementById('screen-wrap');
  if (_screen === 0) w.innerHTML = renderPower();
  else if (_screen === 1) w.innerHTML = renderEndurance();
  else if (_screen === 2) w.innerHTML = renderTechnique();
  else if (_screen === 3) { w.innerHTML = renderForceCurveHTML(); drawForce(); }
  else if (_screen === 4) w.innerHTML = renderIntervals();
  bindFlipCards();
}

// ── Tap-to-flip helper ────────────────────────────────────────────────────────
function bindFlipCards() {
  document.querySelectorAll('[data-flip]').forEach(el => {
    el.onclick = () => {
      const key = el.dataset.flip;
      const alts = JSON.parse(el.dataset.alts);
      _flip[key] = ((_flip[key] || 0) + 1) % alts.length;
      updateFlipCard(el, alts[_flip[key]]);
    };
  });
}
function flipVal(key, alts) {
  const i = _flip[key] || 0;
  return alts[i];
}
function updateFlipCard(el, alt) {

}

// ── Screen 2: Technique ───────────────────────────────────────────────────────
function driveRecoveryRatio() {
  const dt = parseFloat(_s.drive_time_secs);
  const rc = parseFloat(_s.recovery_secs);
  if (!dt || !rc || rc === 0) return '--';
  return `1:${(rc/dt).toFixed(1)}`;
}
function ratioClass() {
  const dt = parseFloat(_s.drive_time_secs);
  const rc = parseFloat(_s.recovery_secs);
  if (!dt || !rc) return '';
  const r = rc/dt;
  return r >= 1.8 && r <= 2.8 ? 'good' : r < 1.5 ? 'bad' : 'warn';
}
function driveDelta() {
  const dl = _s.drive_length_cm_raw;
  const ex = _s.expected_drive_cm;
  if (!dl || !ex) return '--';
  const d = dl - ex;
  return (d >= 0 ? '+' : '') + d + 'cm';
}
function deltaClass() {
  const dl = _s.drive_length_cm_raw;
  const ex = _s.expected_drive_cm;
  if (!dl || !ex) return '';
  return Math.abs(dl - ex) <= 15 ? 'good' : 'warn';
}
function fmtN(v) { return v != null ? Math.round(v)+'N' : '--'; }
function peakRatio() {
  const p = _s.peak_force_n, a = _s.avg_force_n;
  if (!p || !a || a === 0) return '--';
  return (p/a).toFixed(2);
}
function peakRatioClass() {
  const p = _s.peak_force_n, a = _s.avg_force_n;
  if (!p || !a) return '';
  const r = p/a;
  return r >= 1.3 && r <= 1.8 ? 'good' : r > 2.0 ? 'bad' : 'warn';
}
function renderTechnique() {
  return `
    <div class="tech-grid">
      <div class="tech-card"><div class="lbl">Drive</div><div class="val">${_s.drive_time??'--'}</div></div>
      <div class="tech-card"><div class="lbl">Recovery</div><div class="val">${_s.recovery??'--'}</div></div>
      <div class="tech-card"><div class="lbl">Ratio</div><div class="val ${ratioClass()}">${driveRecoveryRatio()}</div></div>
    </div>
    <div class="tech-grid">
      <div class="tech-card"><div class="lbl">Drive Length</div><div class="val">${_s.drive_length??'--'}</div></div>
      <div class="tech-card"><div class="lbl">Expected</div><div class="val">${_s.expected_drive_cm ? _s.expected_drive_cm+'cm':'--'}</div></div>
      <div class="tech-card"><div class="lbl">Delta</div><div class="val ${deltaClass()}">${driveDelta()}</div></div>
    </div>
    <div class="tech-grid">

      <div class="tech-card"><div class="lbl">Avg Force</div><div class="val">${fmtN(_s.avg_force_n)}</div></div>
      <div class="tech-card"><div class="lbl">Peak/Avg</div><div class="val ${peakRatioClass()}">${peakRatio()}</div></div>
    </div>
    <div class="metric-row cols2">
      <div class="tech-card"><div class="lbl">Drag Factor</div><div class="val">${_s.drag_factor??'--'}</div></div>
      <div class="tech-card"><div class="lbl">SPM</div><div class="val">${_s.spm??'--'}</div></div>

// ── Screen 3: Force Curve + Streak ────────────────────────────────────────────
function renderForceCurveHTML() {
  const streak = _s.perfect_streak ?? 0;
  const best   = _s.perfect_streak_best ?? 0;
  return `
    <div id="force-wrap">
      <div class="lbl" style="font-size:11px;color:var(--label);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">Drive Curve</div>
      <canvas id="force-canvas"></canvas>
    </div>
    <div id="streak-wrap">
      <div id="streak-num">${streak}</div>
      <div id="streak-lbl">Perfect Stroke Streak</div>
      <div id="streak-best">Best: ${best}</div>
    </div>`;
}
function drawForce() {
  const canvas = document.getElementById('force-canvas');
  if (!canvas) return;
  const W = canvas.offsetWidth || 300;
  const H = 160;
  canvas.width  = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  const peak   = _s.peak_force_n  || 0;
  const avg    = _s.avg_force_n   || 0;
  const expPk  = _s.expected_peak_n || 200;
  const maxY   = Math.max(peak, expPk, 50) * 1.15;
  const pad    = {l:8, r:8, t:10, b:10};
  const cW = W - pad.l - pad.r;
  const cH = H - pad.t - pad.b;

  function yPx(n) { return pad.t + cH - (n / maxY) * cH; }
  function xPx(t) { return pad.l + t * cW; }        // t in [0,1] = drive progress

  // Draw a smooth approximated curve using cubic bezier
  // Ideal: peak at t=0.33
  function drawCurve(pkN, color) {
    if (pkN <= 0) return;
    ctx.beginPath();
    ctx.moveTo(xPx(0), yPx(0));
    ctx.bezierCurveTo(
      xPx(0.15), yPx(pkN * 0.6),   // control 1
      xPx(0.28), yPx(pkN * 1.0),   // control 2
      xPx(0.33), yPx(pkN)          // peak point
    );
    ctx.bezierCurveTo(
      xPx(0.45), yPx(pkN * 0.8),
      xPx(0.70), yPx(avg * 0.9),
      xPx(1.0),  yPx(0)
    );
    ctx.strokeStyle = color;
    ctx.lineWidth   = 2.5;
    ctx.stroke();
  }

  // Ideal reference curve (grey)
  drawCurve(expPk, '#3a3b4a');

  // Actual curve — coloured by quality
  const ratio = avg > 0 ? peak / avg : 0;
  const color = ratio >= 1.3 && ratio <= 1.8 ? '#26da72'
              : ratio > 2.0                   ? '#ff5940'
              : '#f27219';
  drawCurve(peak, color);

  // Force labels
  ctx.fillStyle = '#737aaa';
  ctx.font      = '11px -apple-system,sans-serif';
  ctx.fillText(`${Math.round(peak)}N peak`, pad.l + 2, pad.t + 12);
  ctx.fillText(`${Math.round(avg)}N avg`,   pad.l + 2, pad.t + 26);
}

// ── Screen 4: Intervals ───────────────────────────────────────────────────────
function renderIntervals() {
  const idx      = (_s.interval_index ?? 0) + 1;
  const total    = _s.interval_total  ?? 0;
  const phase    = _s.interval_phase  ?? 'work';
  const rem      = _s.interval_remaining;
  const active   = _s.session_active;

  if (!total) {
    return `<div style="text-align:center;padding:40px 20px;color:var(--label)">
      No workout selected.<br>Choose a workout from the Workouts tab.
    </div>`;
  }

  const remStr = rem != null
    ? (phase === 'work' || phase === 'rest' ? formatRem(rem, phase) : 'Done')
    : '--';

  const pct = rem != null && rem > 0
    ? Math.max(0, Math.min(100, 100 - (rem / estimateTotal(phase)) * 100))
    : (phase === 'done' ? 100 : 0);

  const phaseLabel = phase === 'work' ? 'WORK' : phase === 'rest' ? 'REST' : 'DONE';

  return `
    <div id="iv-counter">
      <div id="iv-num">${idx}</div>
      <div id="iv-of">of ${total} intervals</div>
      <div id="iv-phase" class="${phase}">${phaseLabel}</div>
    </div>
    <div id="iv-progress-wrap">
      <div id="iv-progress-bg">
        <div id="iv-progress-bar" style="width:${pct}%;background:${phase==='rest'?'var(--orange)':'var(--green)'}"></div>
      </div>
      <div id="iv-remaining">${remStr}</div>
    </div>
    <div class="metric-row cols2">
      ${card('iv-pace','ip0',alts_pace())}
      ${card('iv-dist','ip1',alts_dist())}
    </div>`;
}
function formatRem(sec, phase) {
  if (phase === 'work' && _s.active_workout_name) {
    // If distance-based show metres remaining
    const wid = _s.active_workout_id;
    // sec is metres remaining for distance intervals, seconds for time
    if (sec > 60) return `${sec}m`;
  }
  return `${Math.floor(sec/60)}:${String(sec%60).padStart(2,'0')}`;
}
function estimateTotal(phase) { return 60; }  // rough divisor for progress bar

// ── BLE device selection ──────────────────────────────────────────────────────
function updateBlePill(status, name, devices) {
  _bleDevices = devices || [];
  const dot = document.getElementById('ble-dot');
  const txt = document.getElementById('ble-text');
  if (!dot) return;
  dot.className = status;
  const labels = {
    scanning:    'Scanning…',
    found:       'Select Erg',
    connecting:  'Connecting…',
    connected:   name || 'Connected',
    disconnected:'Disconnected',
  };
  txt.textContent = labels[status] || status;

  if (status === 'found') {
    // If we have a saved preference that matches a found device, auto-connect
    if (_bleAddress) {
      const match = _bleDevices.find(d => d.address === _bleAddress);
      if (match) { selectErg(match.address, match.name); return; }
    }
    // Otherwise show the picker
    openErgPicker();
  }
}

function openErgPicker() {
  const list = document.getElementById('erg-list');
  if (!_bleDevices.length) {
    list.innerHTML = '<p style="color:var(--label);text-align:center;padding:14px 0">Scanning for ergs…</p>';
  } else {
    list.innerHTML = _bleDevices.map(d => `
      <div class="erg-row" onclick="selectErg('${d.address}','${d.name}')">
        <div>
          <div class="erg-row-name">${d.name}</div>
          <div class="erg-row-addr">${d.address}</div>
        </div>
        ${d.address === _bleAddress ? '<span class="erg-check">✓</span>' : ''}
      </div>`).join('');
  }
  document.getElementById('erg-overlay').classList.add('open');
}

function closeErgPicker(e) {
  if (e && e.target !== document.getElementById('erg-overlay')) return;
  document.getElementById('erg-overlay').classList.remove('open');
}

async function selectErg(address, name) {
  _bleAddress = address;
  localStorage.setItem('bleAddress', address);
  await fetch('/api/ble/connect', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({address}),
  });
  closeErgPicker();
}

// ── Poll & update ─────────────────────────────────────────────────────────────
async function tick() {
  try {
    _s = await fetch('/api/state').then(r => r.json());
    _active = _s.session_active;
    _paused = _s.session_paused;

    // Status bar
    const st = document.getElementById('status');
    if (st) {
      if (_paused)      st.innerHTML = '<span class="paused">⏸ Paused</span>';
      else if (_active) st.innerHTML = '<span class="recording">⬤ Recording</span>';
      else              st.textContent = _s.user_name || 'Ready';
    }

    // Buttons
    const bs = document.getElementById('btn-start');
    const bp = document.getElementById('btn-pause');
    const be = document.getElementById('btn-end');
    if (bs) bs.disabled = _active;
    if (bp) { bp.disabled = !_active; bp.textContent = _paused ? 'Resume' : 'Pause'; }
    if (be) be.disabled = !_active;

    // BLE status pill
    updateBlePill(_s.ble_status || 'scanning', _s.ble_name, _s.ble_devices || []);

    // Re-render current screen
    renderScreen();
    renderDots();
  } catch(e) {}
}
setInterval(tick, 500);

// ── Summary ───────────────────────────────────────────────────────────────────
function _paceStr(sec) {
  if (!sec) return '--:--';
  return `${Math.floor(sec/60)}:${String(Math.floor(sec%60)).padStart(2,'0')}`;
}
function _timeStr(sec) {
  if (!sec) return '--';
  sec=Math.floor(sec); const h=sec/3600|0, m=(sec%3600/60)|0, s=sec%60;
  return h ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}` : `${m}:${String(s).padStart(2,'0')}`;
}

async function showSummary(sid, title) {
  const [d, splits] = await Promise.all([
    fetch(`/api/summary/${sid}`).then(r=>r.json()),
    fetch(`/api/summary/${sid}/splits`).then(r=>r.json()),
  ]);

  document.getElementById('summary-title').textContent = title;
  document.getElementById('summary-panel').style.display = 'block';

  const st = d.stats;
  document.getElementById('summary-stats').innerHTML =
    [['Distance',st.distance],['Time',st.time],['Avg Pace',st.avg_pace],
     ['Avg Watts',st.avg_watts],['Avg SPM',st.avg_spm],['Avg HR',st.avg_hr]]
    .map(([l,v])=>`<div class="scard"><div class="lbl">${l}</div><div class="val">${v}</div></div>`)
    .join('');

  // Pace chart
  const pEl = document.getElementById('pace-chart');
  const pWrap = document.getElementById('pace-chart-wrap');
  if (d.pace_series.length) {
    if (_paceChart) _paceChart.destroy();
    _paceChart = new Chart(pEl, {
      type:'line',
      data:{labels:d.pace_series.map(p=>p.x),
            datasets:[{data:d.pace_series.map(p=>p.y),borderColor:'#33bf8a',
              borderWidth:2,pointRadius:0,tension:.3,fill:false}]},
      options:{animation:false,plugins:{legend:{display:false}},
        scales:{x:{display:false},y:{reverse:true,ticks:{color:'#737aaa'},grid:{color:'#2a2b3a'}}}}
    });
    pWrap.style.display='block';
  } else pWrap.style.display='none';

  // Force chart
  const fEl=document.getElementById('force-chart');
  const fWrap=document.getElementById('force-chart-wrap');
  if (d.force_series.length) {
    if (_forceChart) _forceChart.destroy();
    _forceChart = new Chart(fEl,{
      type:'line',
      data:{labels:d.force_series.map(p=>p.x),
            datasets:[
              {label:'Avg N',data:d.force_series.map(p=>p.avg),borderColor:'#4080f2',borderWidth:2,pointRadius:0,fill:false},
              {label:'Peak N',data:d.force_series.map(p=>p.peak),borderColor:'#f27320',borderWidth:2,pointRadius:0,fill:false}
            ]},
      options:{animation:false,plugins:{legend:{labels:{color:'#737aaa'}}},
        scales:{x:{display:false},y:{ticks:{color:'#737aaa'},grid:{color:'#2a2b3a'}}}}
    });
    fWrap.style.display='block';
  } else fWrap.style.display='none';

  // Strive + zones
  const sv=d.strive;
  const ssEl=document.getElementById('strive-score');
  const zbEl=document.getElementById('sum-zone-bar');
  if (sv.score>0) {
    ssEl.textContent=`Strive Score: ${sv.score}`;
    const total=sv.zone_times.reduce((a,b)=>a+b,0)||1;
    zbEl.innerHTML=sv.zone_times.map((t,i)=>
      `<span title="${sv.zone_names[i]}" style="flex:${t/total};background:${sv.zone_hex[i]}"></span>`
    ).join('');
  } else { ssEl.textContent=''; zbEl.innerHTML=''; }

  // Splits table
  const tbody = document.getElementById('splits-body');
  if (splits.length) {
    tbody.innerHTML = splits.map(sp=>
      `<tr><td>${sp.n}</td><td>${sp.dist}</td>
       <td class="${sp.pace_vs_avg==='fast'?'pace-fast':sp.pace_vs_avg==='slow'?'pace-slow':''}">${sp.pace}</td>
       <td>${sp.time}</td><td>${sp.avg_hr??'--'}</td></tr>`
    ).join('');
    document.getElementById('splits-wrap').style.display='block';
  } else document.getElementById('splits-wrap').style.display='none';

  // Streak
  document.getElementById('streak-info').textContent = d.streak>1 ? `${d.streak}-day streak` : '';

  // PRs
  const prNames={longest_distance:'Best distance',longest_time:'Longest time',
    best_avg_watts:'Best avg watts',best_max_watts:'Best peak watts',best_avg_spm:'Best avg SPM'};
  document.getElementById('pr-list').innerHTML=(d.prs||[]).map(([type,,nw])=>{
    const txt=type.startsWith('pace_')
      ? `★ ${type.replace('pace_','').replace('m','')}m pace  ${_paceStr(nw)}/500m`
      : `★ ${prNames[type]||type}  ${Math.round(nw)}`;
    return `<div class="pr">${txt}</div>`;
  }).join('');

  const meta=[];
  if(d.workout_name) meta.push(d.workout_name);
  if(d.drag_factor)  meta.push(`Drag ${d.drag_factor}`);
  document.getElementById('summary-meta').textContent=meta.join('  ·  ');
}

    `<div class="hist-row" onclick="showSummary(${r.id},'${r.label.replace(/'/g,"\\'")}')">
      <span>${r.label}</span><span style="color:var(--label);font-size:18px">›</span>
    </div>`
  ).join('')||'<p style="color:var(--label);font-size:13px">No sessions yet.</p>';
}

// ── Workouts ──────────────────────────────────────────────────────────────────
async function loadWorkouts() {
  const ws=await fetch('/api/workouts').then(r=>r.json());
  document.getElementById('wk-list').innerHTML=ws.map(w=>
    `<div class="wk-row">
      <div><div class="name">${w.name}${w.is_preset?'':' <span style="font-size:11px;color:var(--label)">[custom]</span>'}</div>
           <div class="sub">${w.summary}</div></div>
      <button class="sm sel" onclick="selectWorkout(${w.id},'${w.name.replace(/'/g,"\\'")}')">Use</button>
    </div>`
  ).join('');
}
async function selectWorkout(id,name) {
  await fetch('/api/workouts/select',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({workout_id:id,workout_name:name})});
  nav('row');
}
function renderIntervalForm() {
  const type=document.getElementById('wk-type')?.value;
  if (!type) return;
  const forms = {
    distance: `<div class="form-row"><label>Distance (m)</label><select id="wk-dist">
      ${[100,200,250,300,400,500,750,1000,1500,2000,2500,3000,5000,10000]
        .map(v=>`<option${v===500?' selected':''}>${v}</option>`).join('')}
      </select></div>`,
    time: `<div class="form-row"><label>Duration</label><select id="wk-time">
      ${[[30,'0:30'],[60,'1:00'],[90,'1:30'],[120,'2:00'],[150,'2:30'],[180,'3:00'],
         [240,'4:00'],[300,'5:00'],[480,'8:00'],[600,'10:00'],[900,'15:00'],
         [1200,'20:00'],[1800,'30:00'],[3600,'60:00']]
        .map(([v,l])=>`<option value="${v}"${v===300?' selected':''}>${l}</option>`).join('')}
      </select></div>`,
    calorie: `<div class="form-row"><label>Calories (kcal)</label>
      <input id="wk-cal" type="number" value="50" min="1" max="9999"></div>`,
  };
  document.getElementById('interval-form').innerHTML=forms[type]||'';
}
async function saveWorkout() {
  const name  = document.getElementById('wk-name').value.trim()||'My Workout';
  const type  = document.getElementById('wk-type').value;
  const rest  = parseInt(document.getElementById('wk-rest').value);
  const reps  = parseInt(document.getElementById('wk-reps').value)||1;
  const errEl = document.getElementById('wk-err');
  errEl.textContent='';
  let iv;
  if (type==='distance') {
    const m=parseInt(document.getElementById('wk-dist').value);
    if (m<100) { errEl.textContent='Minimum distance is 100m'; return; }
    iv={type:'distance',meters:m,rest_secs:rest};
  } else if (type==='time') {
    const s=parseInt(document.getElementById('wk-time').value);
    if (s<20) { errEl.textContent='Minimum duration is 20 seconds'; return; }
    iv={type:'time',seconds:s,rest_secs:rest};
  } else {
    const c=parseInt(document.getElementById('wk-cal').value);
    if (c<1) { errEl.textContent='Minimum is 1 calorie'; return; }
    iv={type:'calorie',calories:c,rest_secs:rest};
  }
  const intervals=Array.from({length:Math.min(reps,50)},()=>({...iv}));
  await fetch('/api/workouts',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name,intervals})});
  await loadWorkouts();
}

// ── Plan ──────────────────────────────────────────────────────────────────────
async function loadPlan() {
  const [plan,workouts]=await Promise.all([
    fetch('/api/plan').then(r=>r.json()),
    fetch('/api/workouts').then(r=>r.json()),
  ]);
  const wkOpts=workouts.map(w=>`<option value="${w.id}">${w.name}</option>`).join('');
  document.getElementById('plan-grid').innerHTML=plan.map(d=>`
    <div class="plan-row">
      <div class="plan-day">${d.name}</div>
      <div class="plan-wk ${d.workout_id?'set':''}">${d.workout_name||'Rest'}</div>
      <select id="plan-sel-${d.day}" style="height:34px;background:#111118;color:var(--value);border:1px solid #2a2b3a;border-radius:8px;padding:0 8px;font-size:13px">
        <option value="">Rest</option>${wkOpts}
      </select>
      <button class="sm" onclick="setPlan(${d.day})">Set</button>
    </div>`).join('');
  plan.forEach(d=>{
    if(d.workout_id){ const s=document.getElementById(`plan-sel-${d.day}`); if(s) s.value=d.workout_id; }
  });
}
async function setPlan(day) {
  const wid=document.getElementById(`plan-sel-${day}`).value;
  if(wid) await fetch(`/api/plan/${day}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({workout_id:parseInt(wid)})});
  else    await fetch(`/api/plan/${day}`,{method:'DELETE'});
  loadPlan();
}

// ── Profile ───────────────────────────────────────────────────────────────────
async function loadProfile() {
  const p=await fetch('/api/profile').then(r=>r.json());
  if(p.name)      document.getElementById('p-name').value=p.name;
  if(p.weight_kg) document.getElementById('p-weight').value=p.weight_kg;
  if(p.height_cm){ const ti=p.height_cm/2.54;
    document.getElementById('p-ft').value=Math.floor(ti/12);
    document.getElementById('p-in').value=Math.round(ti%12); }
}
async function saveProfile() {
  const name=document.getElementById('p-name').value.trim();
  const wt=parseFloat(document.getElementById('p-weight').value);
  const ft=parseFloat(document.getElementById('p-ft').value)||0;
  const inch=parseFloat(document.getElementById('p-in').value)||0;
  const dob=document.getElementById('p-dob').value||null;
  const ht=parseFloat(((ft*12+inch)*2.54).toFixed(1));
  const msg=document.getElementById('p-msg');
  if(!name||!wt||!ht){msg.textContent='Name, weight, and height are required.';return;}
  await fetch('/api/profile',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name,weight_kg:wt,height_cm:ht,dob})});
  msg.textContent='Saved.';
  setTimeout(()=>msg.textContent='',2000);
}

// Initial render
renderDots();
tick();
</script>
